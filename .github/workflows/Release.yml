name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Meson and Ninja
        run: pip install meson ninja

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure with Meson
        run: |
          meson setup builddir `
            --buildtype=release `
            -Denable_tools=true `
            -Denable_tests=false

      - name: Build
        run: ninja -C builddir

      - name: Package artifacts
        shell: pwsh
        run: |
          $artifact = "dxbc-spirv-windows-x64"
          New-Item -ItemType Directory -Force -Path "$artifact/lib"
          New-Item -ItemType Directory -Force -Path "$artifact/include"
          New-Item -ItemType Directory -Force -Path "$artifact/tools"

          # Copy static library
          Get-ChildItem -Recurse builddir -Filter "dxbc_spv.lib" |
            Copy-Item -Destination "$artifact/lib/"

          # Copy public headers, preserving subdirectory structure
          foreach ($dir in @("dxbc","ir","sm3","spirv","util")) {
            if (Test-Path $dir) {
              Get-ChildItem -Recurse $dir -Filter "*.h" | ForEach-Object {
                $rel  = $_.FullName.Substring((Get-Location).Path.Length + 1)
                $dest = Join-Path "$artifact/include" (Split-Path $rel)
                New-Item -ItemType Directory -Force -Path $dest | Out-Null
                Copy-Item $_.FullName -Destination $dest
              }
            }
          }

          # Copy CLI tools
          foreach ($tool in @("dxbc_disasm.exe","dxbc_compiler.exe")) {
            $found = Get-ChildItem -Recurse builddir -Filter $tool -ErrorAction SilentlyContinue
            if ($found) { Copy-Item $found.FullName -Destination "$artifact/tools/" }
          }

          # Copy licence and readme
          Copy-Item LICENSE, README.md -Destination "$artifact/"

          Compress-Archive -Path "$artifact" -DestinationPath "$artifact.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dxbc-spirv-windows-x64
          path: dxbc-spirv-windows-x64.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: dxbc-spirv ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-assets/*.zip
          body: |
            ## dxbc-spirv ${{ steps.tag.outputs.tag }}

            IR and translation library for Direct3D Shader Models 5.1 and older.

            ### Downloads

            | Platform | Archive |
            |----------|---------|
            | Windows x64 (MSVC) | `dxbc-spirv-windows-x64.zip` |

            ### Contents

            - `lib/dxbc_spv.lib` — static library
            - `include/` — public headers
            - `tools/dxbc_disasm.exe` — DXBC disassembler
            - `tools/dxbc_compiler.exe` — DXBC → SPIR-V compiler

            ### Building from source

            ```bat
            pip install meson ninja
            meson setup builddir --buildtype=release -Denable_tools=true
            ninja -C builddir
            ```
